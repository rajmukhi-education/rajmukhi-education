const app=document.getElementById('app'),modal=document.getElementById('modal'),box=document.getElementById('box');let user=JSON.parse(localStorage.getItem('rde_user')||'null'),authToken=localStorage.getItem('rde_token')||'',scoreHistory=JSON.parse(localStorage.getItem('rde_scores')||'[]');let courseData=[],notesData=[],noticesData=[],testsData=[],videosData=[],enrollments=[],progressData=[];const API_BASE=window.location.origin; try{localStorage.removeItem('rde_backend_url')}catch(e){}
let refreshInFlight=null;
async function rawApi(path,options={},token=authToken){
 const headers={'Content-Type':'application/json',...(options.headers||{})};
 if(token){headers.Authorization='Bearer '+token;headers['X-Session-Token']=token;}
 const r=await fetch(API_BASE+path,{...options,headers,credentials:'include',cache:'no-store'});
 let data={};try{data=await r.json()}catch{}
 return {r,data};
}
async function api(path,options={},retry=true){
 let {r,data}=await rawApi(path,options);
 if(r.status===401&&retry&&path!=='/api/auth/refresh'&&user){
  try{
   if(!refreshInFlight){
    refreshInFlight=(async()=>{
     const x=await rawApi('/api/auth/refresh',{method:'POST'},authToken);
     if(!x.r.ok)throw new Error(x.data.error||'Session refresh failed');
     authToken=x.data.token;user=x.data.user;
     localStorage.setItem('rde_token',authToken);localStorage.setItem('rde_user',JSON.stringify(user));
     return x.data;
    })().finally(()=>{refreshInFlight=null});
   }
   await refreshInFlight;
   ({r,data}=await rawApi(path,options));
  }catch(e){}
 }
 if(!r.ok){const err=new Error(data.error||'API error');err.status=r.status;err.data=data;throw err}
 return data
}
async function validateSession(){
 try{
  const me=await api('/api/auth/me');
  if(me&&me.user){user=me.user;localStorage.setItem('rde_user',JSON.stringify(user));return true;}
 }catch(e){}
 authToken='';user=null;
 localStorage.removeItem('rde_token');localStorage.removeItem('rde_user');
 return false;
}
async function ensureAuthenticated(){
 if(user){
  try{const me=await api('/api/auth/me');if(me&&me.user){user=me.user;localStorage.setItem('rde_user',JSON.stringify(user));return true;}}catch(e){}
 }
 const ok=await validateSession();
 if(!ok){login();return false;}
 return true;
}
async function loadCloudData(){try{const [c,n,no,t,v]=await Promise.all([api('/api/courses'),api('/api/notes'),api('/api/notices'),api('/api/tests'),api('/api/videos')]);courseData=c.map((x,i)=>({...x,icon:['📘','📗','📙','📕'][i%4]}));notesData=n;noticesData=no;testsData=t;videosData=v}catch(e){console.log('Backend unavailable')}}

 box.innerHTML=`<h2>🔐 Student Login</h2><input id="studentEmail" type="email" placeholder="Email" autocomplete="email"><input id="studentPassword" type="password" placeholder="Password" autocomplete="current-password"><button onclick="studentLogin()">Login</button><button onclick="showRegister()">Create Account</button><button onclick="closeM()">Close</button><div id="authMsg" class="small"></div>`;
 modal.style.display='flex';
}

 box.innerHTML=`<h2>📝 Student Registration</h2><input id="regName" placeholder="पूरा नाम" autocomplete="name"><input id="regEmail" type="email" placeholder="Email" autocomplete="email"><input id="regPassword" type="password" placeholder="Password (कम से कम 6 characters)" autocomplete="new-password"><button onclick="studentRegister()">Register</button><button onclick="login()">Back to Login</button><button onclick="closeM()">Close</button><div id="authMsg" class="small"></div>`;

async function studentLogin(){
 const email=document.getElementById('studentEmail').value.trim();
 const password=document.getElementById('studentPassword').value;
 const msg=document.getElementById('authMsg');
 if(!email||!password){msg.textContent='Email और password भरें';return;}
 try{
  const x=await api('/api/auth/login',{method:'POST',body:JSON.stringify({email,password})},false);
  if(x.requires_2fa){msg.textContent='इस account पर 2FA enabled है; अभी authenticator verification आवश्यक है।';return;}
  setSession(x);
  closeM();
  await loadCloudData();
  home();
 }catch(e){msg.textContent=e.message||'Login failed';}
}
async function studentRegister(){
 const name=document.getElementById('regName').value.trim();
 const email=document.getElementById('regEmail').value.trim();
 const password=document.getElementById('regPassword').value;
 const msg=document.getElementById('authMsg');
 if(!name||!email||password.length<6){msg.textContent='नाम, सही email और कम से कम 6 अक्षर का password भरें';return;}
 try{
  const x=await api('/api/auth/register',{method:'POST',body:JSON.stringify({name,email,password})},false);
  setSession(x);
  closeM();
  await loadCloudData();
  home();
 }catch(e){msg.textContent=e.message||'Registration failed';}
}
function home(){app.innerHTML=`<div class="welcome"><h2>Welcome ${user?user.name:'to Rajmukhi Education'} 👋</h2><p>Learn • Practice • Succeed</p><button onclick="${user?'profile()':'login()'}">${user?'My Profile':'Student Login'}</button><button onclick="admin()">⚙️ Admin Panel</button></div><div class="grid"><div class="card" onclick="courses()"><div class="icon">📚</div><h3>Courses</h3><p>Explore all courses</p></div><div class="card" onclick="studentDashboard()"><div class="icon">🎓</div><h3>My Learning</h3><p>Progress & enrolled courses</p></div><div class="card" onclick="notes()"><div class="icon">📄</div><h3>Notes & PDFs</h3><p>Study material</p></div><div class="card" onclick="videos()"><div class="icon">🎥</div><h3>Video Classes</h3><p>${videosData.length} classes available</p></div><div class="card" onclick="tests()"><div class="icon">📝</div><h3>Quiz & Mock Test</h3><p>${testsData.length} tests available</p></div></div><div class="section"><h2>Popular Courses</h2></div>${courseData.slice(0,4).map((c,i)=>`<div class="course" onclick="course(${i})"><div class="book">${c.icon}</div><div><h3>${c.title}</h3><p>${c.lessons||0} Lessons</p></div></div>`).join('')}<div class="section"><h2>Latest Updates</h2></div>${noticesData.slice(0,3).map(n=>`<div class="panel">📢 <b>${n.title}</b><br><small>${n.message}</small></div>`).join('')||'<div class="panel">Rajmukhi Education में आपका स्वागत है।</div>'}`}

async function course(i){const c=courseData[i];try{const lessons=await api('/api/lessons?course_id='+encodeURIComponent(c.id));app.innerHTML=`<button onclick="courses()">← Back</button><div class="welcome"><h2>${c.icon||'📘'} ${esc(c.title)}</h2><p>${esc(c.description||'')}</p><button onclick="enroll('${c.id}')">🎓 Enroll in Course</button></div><div class="section"><h2>📖 Course Lessons</h2><span class="badge">${lessons.length} available</span></div>${lessons.length?lessons.sort((a,b)=>(a.order||0)-(b.order||0)).map((l,j)=>`<div class="course" onclick="openLessonContentById('${l.id}')"><div class="book">📖</div><div><h3>${j+1}. ${esc(l.title)}</h3><p>${esc(l.description||'Lesson content available')}</p></div></div>`).join(''):'<div class="panel">इस course के lessons जल्द जोड़े जाएंगे।</div>'}`}catch(e){app.innerHTML='<div class="panel">Course load नहीं हो सका। कृपया फिर प्रयास करें।</div>'}}
function notes(){app.innerHTML='<div class="section"><h2>📄 Notes & PDFs</h2></div>'+(notesData.length?notesData.map(n=>`<div class="course" onclick='openNote(${JSON.stringify(n).replace(/'/g,"&#39;")})'>📕<div><h3>${esc(n.title)}</h3><p>${esc(n.description||'Study material')}</p>${n.file_url?'<span class="badge">📄 PDF available</span>':'<span class="badge">📖 Read note</span>'}</div></div>`).join(''):'<div class="panel">अभी कोई notes उपलब्ध नहीं हैं।</div>')}

function tests(){app.innerHTML='<div class="section"><h2>📝 Mock Tests</h2></div>'+(testsData.length?testsData.map(t=>`<div class="course"><div class="book">📝</div><div><h3>${t.title}</h3><p>${t.questionCount} Questions</p><button onclick="startTest('${t.id}')">Start Test</button></div></div>`).join(''):'<div class="panel">अभी कोई test उपलब्ध नहीं है।</div>')}
async function startTest(id){try{const t=await api('/api/tests/'+id);let answers={};app.innerHTML=`<button onclick="tests()">← Back</button><div class="section"><h2>📝 ${t.title}</h2></div>${t.questions.map((q,i)=>`<div class="quizq"><b>${i+1}. ${q.question}</b>${q.options.map((o,j)=>`<button class="option" onclick="chooseAnswer(${i},${j},this)">${String.fromCharCode(65+j)}. ${o}</button>`).join('')}</div>`).join('')}<button onclick="submitDynamicTest('${t.id}',${t.questions.length})">Submit Test</button>`;window.currentTest=t;window.testAnswers=answers}catch(e){alert(e.message)}}
function chooseAnswer(q,j,btn){window.testAnswers[q]=j;btn.parentElement.querySelectorAll('.option').forEach(x=>x.style.border='1px solid #ddd');btn.style.border='2px solid #5a35b7'}
function normalizeAnswer(q){
 const raw=q.answer;
 if(typeof raw==='number'&&Number.isFinite(raw))return raw;
 const s=String(raw??'').trim();
 if(/^\d+$/.test(s))return Number(s);
 if(/^[A-Za-z]$/.test(s))return s.toUpperCase().charCodeAt(0)-65;
 const idx=q.options.findIndex(o=>String(o).trim().toLowerCase()===s.toLowerCase());
 return idx;
}
async function submitDynamicTest(id,total){
 const t=window.currentTest;
 const answers=t.questions.map((q,i)=>{
 const v=window.testAnswers[i];
 return (v!==null&&v!==undefined&&v!=='') ? Number(v) : null;
});
 if(!await ensureAuthenticated())return;
 try{
  const saved=await api('/api/results',{method:'POST',body:JSON.stringify({test_id:id,answers})});
  const score=Number(saved.score||0), actualTotal=Number(saved.total||total||t.questions.length);
  scoreHistory.push({date:new Date().toLocaleDateString('hi-IN'),score,total:actualTotal,created_at:saved.created_at});
  localStorage.setItem('rde_scores',JSON.stringify(scoreHistory.slice(-50)));
  app.innerHTML=`<div class="welcome"><h2>🎉 Test Completed!</h2><p>आपका Score: <b>${score}/${actualTotal}</b></p><p class="small">Result securely saved to your account.</p></div><button onclick="tests()">All Tests</button><button onclick="profile()">View Profile</button>`;
 }catch(e){alert('Test result save नहीं हुआ: '+e.message)}
}
function courseDetail(id){const c=courseData.find(x=>x.id===id);if(!c)return;api('/api/lessons?course_id='+encodeURIComponent(id)).then(ls=>{let enrolled=enrollments.some(e=>e.course_id===id);let done=progressData.filter(p=>p.course_id===id&&p.completed).length;box.innerHTML='<h2>📘 '+esc(c.title)+'</h2><p>'+esc(c.description||'')+'</p><p class="small">Progress: '+done+'/'+ls.length+' lessons completed</p>'+(!enrolled?'<button onclick="enroll('+JSON.stringify(id)+')">Enroll in Course</button>':'<span class="badge">✓ Enrolled</span>')+'<hr>'+ls.map(l=>{let complete=progressData.some(p=>p.lesson_id===l.id&&p.completed);return '<div class="quizq"><b>'+esc(l.title)+'</b><p class="small">'+esc(l.description||'')+'</p><button onclick="toggleLesson('+JSON.stringify(id)+','+JSON.stringify(l.id)+','+(complete?'false':'true')+')">'+(complete?'↩ Mark incomplete':'✓ Mark complete')+'</button><button onclick="openLessonContentById('+JSON.stringify(l.id)+')">📖 Open</button></div>'}).join('');window.lessonCache=ls;modal.style.display='flex'}).catch(e=>alert(e.message))}
async function openLessonContentById(id){
 try{
  let l=(window.lessonCache||[]).find(x=>x.id===id);
  if(!l){
   const all=await api('/api/lessons');
   l=all.find(x=>x.id===id);
  }
  if(l)openLessonContent(l); else alert('Lesson content उपलब्ध नहीं है।');
 }catch(e){alert('Lesson load नहीं हो सका: '+e.message)}
}

async function toggleLesson(courseId,lessonId,completed){if(!await ensureAuthenticated())return;await api('/api/progress',{method:'POST',body:JSON.stringify({course_id:courseId,lesson_id:lessonId,completed})});progressData=await api('/api/progress');courseDetail(courseId)}
async function profile(){if(!await ensureAuthenticated())return;try{const results=await api('/api/results');box.innerHTML=`<h2>👤 My Profile</h2><div class="panel"><b>${esc(user.name)}</b><br>${esc(user.email)}<br><span class="badge">${esc(user.role)}</span></div><h3>📊 My Results</h3>${results.length?results.slice().reverse().map(s=>`<div class="course">📝 ${new Date(s.created_at).toLocaleString('hi-IN')}<br><b>Score: ${esc(s.score)}/${esc(s.total)}</b></div>`).join(''):'<p>अभी कोई test result नहीं है।'}<button onclick="studentDashboard()">🎓 My Learning</button><button onclick="logout()">Logout</button><button onclick="closeM()">Close</button>`;modal.style.display='flex'}catch(e){alert(e.message)}}
async function logout(){try{await api('/api/auth/logout',{method:'POST'})}catch(e){}user=null;authToken='';localStorage.removeItem('rde_user');localStorage.removeItem('rde_token');closeM();home()}
function admin(){box.innerHTML=`<h2>🔐 Admin Login</h2><input id="adminPass" type="password" placeholder="Admin Password"><button onclick="adminAuth()">Login</button><button onclick="closeM()">Close</button>`;modal.style.display='flex'}
function setSession(x){
 if(!x||!x.token||!x.user) throw new Error('Login response में session token नहीं मिला');
 authToken=String(x.token);
 user=x.user;
 localStorage.setItem('rde_token',authToken);
 localStorage.setItem('rde_user',JSON.stringify(user));
 return true;
}

async function editAdminContent(type,id){try{const d=await api('/api/admin/content');const x=(d.content||[]).find(a=>a.type===type&&a.id===id);if(!x)return alert('Content not found');if(type==='courses'){box.innerHTML=`<h2>✏️ Edit Course</h2><input id="editTitle" value="${esc(x.title)}"><textarea id="editDesc">${esc(x.description||'')}</textarea><button onclick="updateAdminContent('courses','${id}')">Save</button><button onclick="contentManager()">Back</button>`}else if(type==='lessons'){box.innerHTML=`<h2>✏️ Edit Lesson</h2><select id="editCourse">${courseData.map(c=>`<option value="${c.id}" ${c.id===x.course_id?'selected':''}>${esc(c.title)}</option>`).join('')}</select><input id="editTitle" value="${esc(x.title)}"><textarea id="editDesc">${esc(x.description||'')}</textarea><textarea id="editContent">${esc(x.content||'')}</textarea><button onclick="updateAdminContent('lessons','${id}')">Save</button><button onclick="contentManager()">Back</button>`}else if(type==='notes'){box.innerHTML=`<h2>✏️ Edit Note / PDF</h2><input id="editTitle" value="${esc(x.title)}"><textarea id="editDesc">${esc(x.description||'')}</textarea><textarea id="editContent">${esc(x.content||'')}</textarea><input id="editUrl" value="${esc(x.file_url||'')}" placeholder="PDF URL"><button onclick="updateAdminContent('notes','${id}')">Save</button><button onclick="contentManager()">Back</button>`}else if(type==='videos'){box.innerHTML=`<h2>✏️ Edit Video</h2><input id="editTitle" value="${esc(x.title)}"><textarea id="editDesc">${esc(x.description||'')}</textarea><input id="editUrl" value="${esc(x.url||'')}" placeholder="Video URL"><button onclick="updateAdminContent('videos','${id}')">Save</button><button onclick="contentManager()">Back</button>`}else if(type==='notices'){box.innerHTML=`<h2>✏️ Edit Notice</h2><input id="editTitle" value="${esc(x.title)}"><textarea id="editContent">${esc(x.message||'')}</textarea><button onclick="updateAdminContent('notices','${id}')">Save</button><button onclick="contentManager()">Back</button>`}else if(type==='tests'){const qs=JSON.stringify(x.questions||[],null,2);box.innerHTML=`<h2>✏️ Edit Test</h2><input id="editTitle" value="${esc(x.title)}"><select id="editCourse"><option value="">No course</option>${courseData.map(c=>`<option value="${c.id}" ${c.id===x.course_id?'selected':''}>${esc(c.title)}</option>`).join('')}</select><textarea id="editContent" style="height:220px">${esc(qs)}</textarea><button onclick="updateAdminContent('tests','${id}')">Save</button><button onclick="contentManager()">Back</button>`}}catch(e){alert(e.message)}}
async function updateAdminContent(type,id){try{let body={};if(type==='courses')body={title:document.getElementById('editTitle').value,description:document.getElementById('editDesc').value};if(type==='lessons')body={course_id:document.getElementById('editCourse').value,title:document.getElementById('editTitle').value,description:document.getElementById('editDesc').value,content:document.getElementById('editContent').value};if(type==='notes')body={title:document.getElementById('editTitle').value,description:document.getElementById('editDesc').value,content:document.getElementById('editContent').value,file_url:document.getElementById('editUrl').value};if(type==='videos')body={title:document.getElementById('editTitle').value,description:document.getElementById('editDesc').value,url:document.getElementById('editUrl').value};if(type==='notices')body={title:document.getElementById('editTitle').value,message:document.getElementById('editContent').value};if(type==='tests'){body={title:document.getElementById('editTitle').value,course_id:document.getElementById('editCourse').value,questions:JSON.parse(document.getElementById('editContent').value)}}await api('/api/admin/'+type+'/'+encodeURIComponent(id),{method:'PUT',body:JSON.stringify(body)});await loadCloudData();alert('Updated');contentManager()}catch(e){alert(e.message)}}
async function deleteAdminContent(type,id){
 if(!confirm('Delete this item?'))return;
 try{
  const endpoint=type==='lessons'?'/api/admin/lessons/':('/api/admin/content/'+type+'/');
  await api(endpoint+encodeURIComponent(id),{method:'DELETE'});
  await loadCloudData();
  if(type==='lessons' && typeof loadAdminLessons==='function') return loadAdminLessons();
  return loadAdminContentList();
 }catch(e){alert('Delete failed: '+e.message)}
}

async function createTest(){try{const title=document.getElementById('testTitle').value.trim(),q=JSON.parse(document.getElementById('testJson').value);if(!title||!Array.isArray(q)||!q.length)return alert('Title and valid questions required');const normalized=q.map(x=>{const y={...x};if(y.answer_index===undefined&&y.answer!==undefined){const n=Number(y.answer);if(Number.isInteger(n)&&n>=1&&n<=((y.options||[]).length))y.answer_index=n-1;else if(Number.isInteger(n))y.answer_index=n;}return y});await api('/api/admin/tests',{method:'POST',body:JSON.stringify({title,course_id:document.getElementById('testCourse').value,questions:normalized})});await loadCloudData();alert('Test created');adminDashboard()}catch(e){alert(e.message)}}

function openNote(n){const file=n.file_url||n.url||'';const src=file&&/^https?:\/\//i.test(file)?file:(file?API_BASE+file:'');box.innerHTML='<h2>📄 '+esc(n.title||'Study Note')+'</h2><p>'+esc(n.description||'')+'</p>'+(src?'<iframe src="'+esc(src)+'" style="width:100%;height:60vh;border:0"></iframe>':'<div class="quizq">'+formatLessonContent(n.content||'No content available')+'</div>');modal.style.display='flex'}
function openVideo(v){let url=String(v.url||'');let embed='';const yt=url.match(/(?:youtube\.com\/(?:watch\?v=|shorts\/)|youtu\.be\/)([A-Za-z0-9_-]{6,})/i);if(yt)embed='https://www.youtube.com/embed/'+yt[1];const src=url&&/^https?:\/\//i.test(url)?url:(url?API_BASE+url:'');box.innerHTML='<h2>🎥 '+esc(v.title||'Video Class')+'</h2>'+ (embed?'<iframe src="'+embed+'" style="width:100%;aspect-ratio:16/9;border:0" allowfullscreen></iframe>':(src?'<video controls style="width:100%;max-height:60vh" src="'+esc(src)+'"></video>':'<div class="quizq">Video URL is not available.</div>'));modal.style.display='flex'}
function formatLessonContent(content){
 const text=String(content||'Lesson content will be added soon.');
 return esc(text).split('\n\n').map(block=>{
  const lines=block.split('\n');
  if(lines.every(x=>/^\s*[•📌🧠✍️]|^\s*\d+\./.test(x))) return '<ul>'+lines.map(x=>'<li>'+x.replace(/^\s*(?:•|\d+\.\s*)/,'')+'</li>').join('')+'</ul>';
  return '<p>'+lines.join('<br>')+'</p>';
 }).join('');
}

async function openLessonContent(l){
 try{
  const all=await api('/api/lessons?course_id='+encodeURIComponent(l.course_id));
  const lessons=all.sort((a,b)=>(a.order||0)-(b.order||0));
  const index=Math.max(0,lessons.findIndex(x=>x.id===l.id));
  const current=lessons[index]||l;
  const done=progressData.some(p=>p.lesson_id===current.id&&p.completed);
  const percent=lessons.length?Math.round(((index+1)/lessons.length)*100):100;
  box.innerHTML='<div class="lesson-reader">'+
   '<button onclick="closeM()">← Back to Course</button>'+
   '<p class="small">Lesson '+(index+1)+' of '+lessons.length+'</p>'+
   '<div class="lesson-progress"><span style="width:'+percent+'%"></span></div>'+
   '<h2>📖 '+esc(current.title)+'</h2>'+
   '<p class="small">'+esc(current.description||'')+'</p>'+
   '<div class="lesson-content">'+formatLessonContent(current.content||'Lesson content will be added soon.')+'</div>'+
   '<button id="completeLessonBtn" type="button">'+(done?'↩ Mark incomplete':'✓ Mark as completed')+'</button>'+
   '<div class="lesson-nav">'+
   (index>0?'<button onclick="openLessonContentById('+JSON.stringify(lessons[index-1].id)+')">← Previous</button>':'<span></span>')+
   (index<lessons.length-1?'<button onclick="openLessonContentById('+JSON.stringify(lessons[index+1].id)+')">Next →</button>':'<span></span>')+
   '</div></div>';
  window.lessonCache=lessons;
  modal.style.display='flex';
  const completeBtn=document.getElementById('completeLessonBtn');
  if(completeBtn){
    completeBtn.onclick=()=>completeAndContinue(String(current.course_id),String(current.id),!done);
  }
 }catch(e){alert(e.message)}
}
async function completeAndContinue(courseId,lessonId,completed){
 const btn=document.getElementById('completeLessonBtn');
 if(!await ensureAuthenticated())return;
 if(btn){btn.disabled=true;btn.textContent='⏳ Saving...'}
 try{
  const payload={course_id:String(courseId),lesson_id:String(lessonId),completed:Boolean(completed)};
  await api('/api/progress',{method:'POST',body:JSON.stringify(payload)});
  progressData=await api('/api/progress');
  const lessons=window.lessonCache||[];
  const i=lessons.findIndex(x=>String(x.id)===String(lessonId));
  const currentLesson=lessons[i]||{id:lessonId,course_id:courseId};
  if(btn){btn.disabled=false;btn.textContent=completed?'✓ Completed':'✓ Mark as completed'}
  alert(completed?'Lesson completed successfully!':'Lesson marked incomplete.');
  await openLessonContent(currentLesson);
 }catch(e){
  if(btn){btn.disabled=false;btn.textContent=completed?'✓ Mark as completed':'↩ Mark incomplete'}
  const msg=String(e.message||e);
  if(/authentication required|unauthorized|invalid token|session/i.test(msg)){
    localStorage.removeItem('rde_token'); localStorage.removeItem('rde_user');
    authToken=''; user=null;
    alert('आपका login session समाप्त हो गया है। कृपया Student Login करके फिर Mark as completed दबाएँ।');
    login();
  }else{
    alert('Progress save नहीं हुआ: '+msg);
  }
} 
}


async function adminUpload(){
 if(!authToken)return login();
 box.innerHTML='<h2>📤 Upload Study Material</h2><p class="small">Upload PDF, video or image files.</p><form onsubmit="submitUpload(event)"><input id="uploadFile" type="file" accept=".pdf,video/*,image/*" required><button>Upload File</button></form><p class="small">After upload, use the returned file URL in Notes or Video Classes.</p>';
 modal.style.display='flex';
}
async function submitUpload(e){
 e.preventDefault();const f=document.getElementById('uploadFile').files[0];if(!f)return;
 const reader=new FileReader();reader.onload=async()=>{const base64=String(reader.result).split(',')[1]||'';const r=await fetch(API_BASE+'/api/admin/upload',{method:'POST',headers:{'Content-Type':'application/json',Authorization:'Bearer '+authToken},body:JSON.stringify({filename:f.name,content_base64:base64})});
 const d=await r.json();if(!r.ok)throw new Error(d.error||'Upload failed');
 box.innerHTML='<h2>✅ Upload Successful</h2><p>'+esc(d.filename)+'</p><div class="quizq"><b>File URL:</b><br>'+esc(d.url)+'</div><button onclick="adminUpload()">Upload Another</button>';};reader.readAsDataURL(f);
}
