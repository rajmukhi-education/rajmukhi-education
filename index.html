<!doctype html><html lang="hi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Rajmukhi Education</title><style>
*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:#f6f4ff;color:#21184f}header{background:linear-gradient(135deg,#4b2aa8,#7048cf);color:#fff;padding:22px 18px 25px;border-radius:0 0 26px 26px}h1{margin:0;font-size:25px}.tag{opacity:.9;margin-top:5px}.search{background:#fff;color:#777;padding:13px;border-radius:13px;margin-top:17px}main{padding:16px 16px 82px}.welcome{background:linear-gradient(135deg,#5c35b8,#8a64d8);color:#fff;padding:20px;border-radius:18px;margin-bottom:16px}.welcome h2{margin:0 0 8px}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.card,.course,.panel{background:#fff;border-radius:15px;padding:16px;box-shadow:0 3px 12px #0000000d}.card{cursor:pointer}.icon{font-size:29px}.card h3{margin:8px 0 4px;font-size:16px}.card p,.course p{margin:0;color:#777;font-size:12px}.section{display:flex;justify-content:space-between;align-items:center;margin:20px 0 10px}.section h2{margin:0;font-size:18px}.course{display:flex;gap:12px;align-items:center;margin-bottom:10px;cursor:pointer}.book{font-size:28px}.course h3{margin:0 0 5px;font-size:15px}button{border:0;background:#5a35b7;color:#fff;border-radius:9px;padding:10px 14px;font-weight:bold;cursor:pointer;margin:3px}.bottom{position:fixed;bottom:0;left:0;right:0;background:#fff;display:flex;justify-content:space-around;padding:10px 4px;border-top:1px solid #eee}.bottom span{text-align:center;font-size:11px;cursor:pointer}.bottom b{display:block;font-size:20px}.modal{display:none;position:fixed;inset:0;background:#0008;align-items:center;justify-content:center;padding:20px}.modalbox{background:#fff;border-radius:18px;padding:22px;width:100%;max-width:500px;max-height:92vh;overflow:auto}.modalbox input,.modalbox textarea,.modalbox select{width:100%;padding:12px;margin:7px 0;border:1px solid #ddd;border-radius:9px}.quizq{margin:12px 0;padding:14px;background:#f7f5ff;border-radius:12px}.option{display:block;width:100%;margin:7px 0;background:#fff;color:#222;border:1px solid #ddd;text-align:left}.badge{display:inline-block;background:#eee8ff;padding:5px 9px;border-radius:20px;font-size:12px;margin:3px}.video{width:100%;border-radius:12px;margin-top:8px}.small{font-size:12px;color:#777}.danger{background:#a62828}.row{display:flex;gap:6px;flex-wrap:wrap}
</style><link rel="manifest" href="manifest.json"><meta name="theme-color" content="#5a35b7"></head><body><header><h1>Rajmukhi Education</h1><div class="tag">ज्ञान से सफलता की ओर</div><input class="search" id="search" placeholder="🔍 Search courses, notes, tests..." oninput="searchAll(this.value)"></header><main id="app"></main><nav class="bottom"><span onclick="home()"><b>🏠</b>Home</span><span onclick="courses()"><b>📚</b>Courses</span><span onclick="tests()"><b>📝</b>Tests</span><span onclick="notes()"><b>📄</b>Notes</span><span onclick="profile()"><b>👤</b>Profile</span></nav><div class="modal" id="modal"><div class="modalbox" id="box"></div></div><script>
const app=document.getElementById('app'),modal=document.getElementById('modal'),box=document.getElementById('box');let user=JSON.parse(localStorage.getItem('rde_user')||'null'),authToken=localStorage.getItem('rde_token')||'',scoreHistory=JSON.parse(localStorage.getItem('rde_scores')||'[]');let courseData=[],notesData=[],noticesData=[],testsData=[],videosData=[],enrollments=[],progressData=[];const API_BASE=localStorage.getItem('rde_backend_url')||window.location.origin;
async function api(path,options={}){const headers={'Content-Type':'application/json',...(options.headers||{})};if(authToken)headers.Authorization='Bearer '+authToken;const r=await fetch(API_BASE+path,{...options,headers});if(!r.ok)throw new Error((await r.json().catch(()=>({}))).error||'API error');return r.json()}
async function loadCloudData(){try{const [c,n,no,t,v]=await Promise.all([api('/api/courses'),api('/api/notes'),api('/api/notices'),api('/api/tests'),api('/api/videos')]);courseData=c.map((x,i)=>({...x,icon:['📘','📗','📙','📕'][i%4]}));notesData=n;noticesData=no;testsData=t;videosData=v}catch(e){console.log('Backend unavailable')}}
function home(){app.innerHTML=`<div class="welcome"><h2>Welcome ${user?user.name:'to Rajmukhi Education'} 👋</h2><p>Learn • Practice • Succeed</p><button onclick="${user?'profile()':'login()'}">${user?'My Profile':'Student Login'}</button><button onclick="admin()">⚙️ Admin Panel</button></div><div class="grid"><div class="card" onclick="courses()"><div class="icon">📚</div><h3>Courses</h3><p>Explore all courses</p></div><div class="card" onclick="notes()"><div class="icon">📄</div><h3>Notes & PDFs</h3><p>Study material</p></div><div class="card" onclick="videos()"><div class="icon">🎥</div><h3>Video Classes</h3><p>${videosData.length} classes available</p></div><div class="card" onclick="tests()"><div class="icon">📝</div><h3>Quiz & Mock Test</h3><p>${testsData.length} tests available</p></div></div><div class="section"><h2>Popular Courses</h2></div>${courseData.slice(0,4).map((c,i)=>`<div class="course" onclick="course(${i})"><div class="book">${c.icon}</div><div><h3>${c.title}</h3><p>${c.lessons||0} Lessons</p></div></div>`).join('')}<div class="section"><h2>Latest Updates</h2></div>${noticesData.slice(0,3).map(n=>`<div class="panel">📢 <b>${n.title}</b><br><small>${n.message}</small></div>`).join('')||'<div class="panel">Rajmukhi Education में आपका स्वागत है।</div>'}`}
function courses(){app.innerHTML='<div class="section"><h2>📚 All Courses</h2></div>'+courseData.map((c,i)=>`<div class="course" onclick="course(${i})"><div class="book">${c.icon||'📘'}</div><div><h3>${c.title}</h3><p>${c.description||''}</p><span class="badge">${c.lessons||0} Lessons</span></div></div>`).join('')}
async function course(i){const c=courseData[i];try{const lessons=await api('/api/lessons?course_id='+encodeURIComponent(c.id));app.innerHTML=`<button onclick="courses()">← Back</button><div class="welcome"><h2>${c.icon||'📘'} ${esc(c.title)}</h2><p>${esc(c.description||'')}</p><button onclick="enroll('${c.id}')">🎓 Enroll in Course</button></div><div class="section"><h2>📖 Course Lessons</h2><span class="badge">${lessons.length} available</span></div>${lessons.length?lessons.sort((a,b)=>(a.order||0)-(b.order||0)).map((l,j)=>`<div class="course" onclick="openLessonContentById('${l.id}')"><div class="book">📖</div><div><h3>${j+1}. ${esc(l.title)}</h3><p>${esc(l.description||'Lesson content available')}</p></div></div>`).join(''):'<div class="panel">इस course के lessons जल्द जोड़े जाएंगे।</div>'}`}catch(e){app.innerHTML='<div class="panel">Course load नहीं हो सका। कृपया फिर प्रयास करें।</div>'}}
function notes(){app.innerHTML='<div class="section"><h2>📄 Notes & PDFs</h2></div>'+(notesData.length?notesData.map(n=>`<div class="course">📕<div><h3>${n.title}</h3><p>${n.description||'Study material'}</p>${n.file_url?`<a href="${API_BASE+n.file_url}" target="_blank">Open PDF</a>`:''}</div></div>`).join(''):'<div class="panel">अभी कोई notes उपलब्ध नहीं हैं।</div>')}
function videos(){app.innerHTML='<div class="section"><h2>🎥 Video Classes</h2></div>'+(videosData.length?videosData.map(v=>`<div class="panel"><h3>${v.title}</h3><p>${v.description||''}</p>${v.url.match(/\.(mp4|webm)(\?|$)/i)?`<video class="video" controls src="${v.url.startsWith('http')?v.url:API_BASE+v.url}"></video>`:`<a href="${v.url.startsWith('http')?v.url:API_BASE+v.url}" target="_blank"><button>▶️ Watch Class</button></a>`}</div>`).join(''):'<div class="panel">अभी कोई video class उपलब्ध नहीं है।</div>')}
function tests(){app.innerHTML='<div class="section"><h2>📝 Mock Tests</h2></div>'+(testsData.length?testsData.map(t=>`<div class="course"><div class="book">📝</div><div><h3>${t.title}</h3><p>${t.questionCount} Questions</p><button onclick="startTest('${t.id}')">Start Test</button></div></div>`).join(''):'<div class="panel">अभी कोई test उपलब्ध नहीं है।</div>')}
async function startTest(id){try{const t=await api('/api/tests/'+id);let answers={};app.innerHTML=`<button onclick="tests()">← Back</button><div class="section"><h2>📝 ${t.title}</h2></div>${t.questions.map((q,i)=>`<div class="quizq"><b>${i+1}. ${q.question}</b>${q.options.map((o,j)=>`<button class="option" onclick="chooseAnswer(${i},${j},this)">${String.fromCharCode(65+j)}. ${o}</button>`).join('')}</div>`).join('')}<button onclick="submitDynamicTest('${t.id}',${t.questions.length})">Submit Test</button>`;window.currentTest=t;window.testAnswers=answers}catch(e){alert(e.message)}}
function chooseAnswer(q,j,btn){window.testAnswers[q]=j;btn.parentElement.querySelectorAll('.option').forEach(x=>x.style.border='1px solid #ddd');btn.style.border='2px solid #5a35b7'}
async function submitDynamicTest(id,total){const t=window.currentTest;let score=t.questions.reduce((s,q,i)=>s+(window.testAnswers[i]===q.answer?1:0),0);scoreHistory.push({date:new Date().toLocaleDateString('hi-IN'),score,total});localStorage.setItem('rde_scores',JSON.stringify(scoreHistory));if(user)try{await api('/api/results',{method:'POST',body:JSON.stringify({test_id:id,score,total})})}catch(e){}app.innerHTML=`<div class="welcome"><h2>🎉 Test Completed!</h2><p>आपका Score: <b>${score}/${total}</b></p></div><button onclick="tests()">All Tests</button><button onclick="profile()">View Profile</button>`}
function login(){box.innerHTML=`<h2>👤 Student Account</h2><input id="name" placeholder="पूरा नाम"><input id="email" placeholder="Email"><input id="pass" type="password" placeholder="Password"><button onclick="register()">Create Account</button><button onclick="studentLogin()">Login</button><button onclick="closeM()">Close</button>`;modal.style.display='flex'}
function register(){const name=document.getElementById('name').value.trim(),email=document.getElementById('email').value.trim(),pass=document.getElementById('pass').value;if(!name||!email||!pass)return alert('कृपया सभी fields भरें');api('/api/auth/register',{method:'POST',body:JSON.stringify({name,email,password:pass})}).then(setSession).catch(e=>alert(e.message))}
function studentLogin(){const email=document.getElementById('email').value.trim(),pass=document.getElementById('pass').value;api('/api/auth/login',{method:'POST',body:JSON.stringify({email,password:pass})}).then(setSession).catch(e=>alert(e.message))}
function setSession(x){authToken=x.token;user=x.user;localStorage.setItem('rde_token',authToken);localStorage.setItem('rde_user',JSON.stringify(user));closeM();home()}
function courseDetail(id){const c=courseData.find(x=>x.id===id);if(!c)return;api('/api/lessons?course_id='+encodeURIComponent(id)).then(ls=>{let enrolled=enrollments.some(e=>e.course_id===id);let done=progressData.filter(p=>p.course_id===id&&p.completed).length;box.innerHTML='<h2>📘 '+esc(c.title)+'</h2><p>'+esc(c.description||'')+'</p><p class="small">Progress: '+done+'/'+ls.length+' lessons completed</p>'+(!enrolled?'<button onclick="enroll('+JSON.stringify(id)+')">Enroll in Course</button>':'<span class="badge">✓ Enrolled</span>')+'<hr>'+ls.map(l=>{let complete=progressData.some(p=>p.lesson_id===l.id&&p.completed);return '<div class="quizq"><b>'+esc(l.title)+'</b><p class="small">'+esc(l.description||'')+'</p><button onclick="toggleLesson('+JSON.stringify(id)+','+JSON.stringify(l.id)+','+(complete?'false':'true')+')">'+(complete?'↩ Mark incomplete':'✓ Mark complete')+'</button><button onclick="openLessonContentById('+JSON.stringify(l.id)+')">📖 Open</button></div>'}).join('');window.lessonCache=ls;modal.style.display='flex'}).catch(e=>alert(e.message))}
function openLessonContentById(id){const l=(window.lessonCache||[]).find(x=>x.id===id);if(l)openLessonContent(l)}
async function enroll(id){if(!authToken){return login()}await api('/api/enrollments',{method:'POST',body:JSON.stringify({course_id:id})});enrollments=await api('/api/enrollments');modal.style.display='none';courses()}
async function toggleLesson(courseId,lessonId,completed){if(!authToken){return login()}await api('/api/progress',{method:'POST',body:JSON.stringify({course_id:courseId,lesson_id:lessonId,completed})});progressData=await api('/api/progress');courseDetail(courseId)}
function profile(){if(!user)return login();box.innerHTML=`<h2>👤 My Profile</h2><div class="panel"><b>${user.name}</b><br>${user.email}<br><span class="badge">${user.role}</span></div><h3>📊 My Results</h3>${scoreHistory.length?scoreHistory.map(s=>`<div class="course">📝 ${s.date}<br><b>Score: ${s.score}/${s.total}</b></div>`).join(''):'<p>अभी कोई test result नहीं है।'}<button onclick="logout()">Logout</button><button onclick="closeM()">Close</button>`;modal.style.display='flex'}
async function logout(){try{await api('/api/auth/logout',{method:'POST'})}catch(e){}user=null;authToken='';localStorage.removeItem('rde_user');localStorage.removeItem('rde_token');closeM();home()}
function admin(){box.innerHTML=`<h2>🔐 Admin Login</h2><input id="adminPass" type="password" placeholder="Admin Password"><button onclick="adminAuth()">Login</button><button onclick="closeM()">Close</button>`;modal.style.display='flex'}
async function adminAuth(){try{const x=await api('/api/auth/login',{method:'POST',body:JSON.stringify({email:'admin@rajmukhi.education',password:document.getElementById('adminPass').value})});setSession(x);adminDashboard()}catch(e){alert(e.message)}}
async function adminDashboard(){if(!authToken)return login();try{const d=await api('/api/admin/dashboard');const cards=[['Students',d.students],['Courses',d.courses],['Lessons',d.lessons],['Tests',d.tests],['Attempts',d.attempts],['Uploads',d.uploads]].map(x=>`<div class="stat"><b>${x[1]}</b><span>${x[0]}</span></div>`).join('');const recent=(d.recentResults||[]).length?d.recentResults.map(r=>`${esc(r.score)}/${esc(r.total)}`).join(' • '):'No attempts yet';box.innerHTML=`<h2>⚙️ Admin Dashboard</h2><div class="stats">${cards}</div><div class="row"><button onclick="contentManager()">📚 Content Manager</button><button onclick="testCreator()">📝 Test Creator</button><button onclick="videoManager()">🎥 Video Classes</button><button onclick="uploadManager()">📤 Upload File</button><button onclick="adminLessons()">📖 Lesson Manager</button><button onclick="exportData()">📥 Export</button></div><div class="panel"><b>Recent test activity</b><br><small>${recent}</small></div><button onclick="closeM()">Close</button>`;modal.style.display='flex'}catch(e){alert(e.message)}}
function contentManager(){box.innerHTML=`<h2>📚 Content Manager</h2><input id="newCourse" placeholder="Course name"><input id="courseDesc" placeholder="Description"><input id="newNote" placeholder="Note/PDF title"><input id="noteUrl" placeholder="PDF URL or uploaded URL"><input id="newNotice" placeholder="Notice title"><textarea id="noticeMsg" placeholder="Notice message"></textarea><button onclick="saveContent()">Save Content</button><button onclick="adminDashboard()">Back</button>`}
async function saveContent(){try{const c=document.getElementById('newCourse').value.trim(),n=document.getElementById('newNote').value.trim(),no=document.getElementById('newNotice').value.trim();if(c)await api('/api/admin/courses',{method:'POST',body:JSON.stringify({title:c,description:document.getElementById('courseDesc').value,lessons:0})});if(n)await api('/api/admin/notes',{method:'POST',body:JSON.stringify({title:n,description:'Study material',file_url:document.getElementById('noteUrl').value})});if(no)await api('/api/admin/notices',{method:'POST',body:JSON.stringify({title:no,message:document.getElementById('noticeMsg').value})});await loadCloudData();alert('Content saved');adminDashboard()}catch(e){alert(e.message)}}
function testCreator(){box.innerHTML=`<h2>📝 Test Creator</h2><input id="testTitle" placeholder="Test Title"><textarea id="testJson" style="height:220px" placeholder='[{"question":"2+2?","options":["3","4"],"answer":1}]'></textarea><button onclick="createTest()">Create Test</button><button onclick="adminDashboard()">Back</button>`}
async function createTest(){try{const q=JSON.parse(document.getElementById('testJson').value);await api('/api/admin/tests',{method:'POST',body:JSON.stringify({title:document.getElementById('testTitle').value,questions:q})});await loadCloudData();alert('Test created');adminDashboard()}catch(e){alert(e.message)}}
function videoManager(){box.innerHTML=`<h2>🎥 Add Video Class</h2><input id="videoTitle" placeholder="Video title"><input id="videoUrl" placeholder="YouTube URL or uploaded video URL"><textarea id="videoDesc" placeholder="Description"></textarea><button onclick="addVideo()">Save Video</button><button onclick="adminDashboard()">Back</button>`}
async function addVideo(){try{await api('/api/admin/videos',{method:'POST',body:JSON.stringify({title:document.getElementById('videoTitle').value,url:document.getElementById('videoUrl').value,description:document.getElementById('videoDesc').value})});await loadCloudData();alert('Video class added');adminDashboard()}catch(e){alert(e.message)}}
function uploadManager(){box.innerHTML=`<h2>📤 Upload File</h2><p class="small">PDF, image या video file चुनें।</p><input id="fileInput" type="file"><button onclick="uploadFile()">Upload</button><button onclick="adminDashboard()">Back</button>`}
async function uploadFile(){const f=document.getElementById('fileInput').files[0];if(!f)return alert('File चुनें');const reader=new FileReader();reader.onload=async()=>{try{const base64=reader.result.split(',')[1];const x=await api('/api/admin/upload',{method:'POST',body:JSON.stringify({filename:f.name,content_base64:base64})});alert('Uploaded: '+x.url);adminDashboard()}catch(e){alert(e.message)}};reader.readAsDataURL(f)}
function exportData(){const data={user,courses:courseData,scores:scoreHistory,exportedAt:new Date().toISOString()};const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));a.download='rajmukhi_education_data.json';a.click()}
function searchAll(q){q=q.toLowerCase();if(!q)return home();const all=[...courseData.map(x=>({type:'Course',title:x.title,desc:x.description})),...notesData.map(x=>({type:'Note',title:x.title,desc:x.description})),...testsData.map(x=>({type:'Test',title:x.title,desc:x.questionCount+' questions'})),...videosData.map(x=>({type:'Video',title:x.title,desc:x.description}))].filter(x=>(x.title+' '+(x.desc||'')).toLowerCase().includes(q));app.innerHTML='<div class="section"><h2>🔍 Search Results</h2></div>'+(all.length?all.map(x=>`<div class="course"><div class="book">${x.type==='Course'?'📚':x.type==='Note'?'📄':x.type==='Test'?'📝':'🎥'}</div><div><h3>${x.title}</h3><p>${x.desc||''}</p><span class="badge">${x.type}</span></div></div>`).join(''):'<div class="panel">कोई परिणाम नहीं मिला।</div>')}
function closeM(){modal.style.display='none'}
async function enroll(courseId){if(!authToken)return login();try{await api('/api/enrollments',{method:'POST',body:JSON.stringify({course_id:courseId})});alert('Course में enrollment सफल हुआ');studentDashboard()}catch(e){alert(e.message)}}
async function logout(){try{if(authToken)await api('/api/auth/logout',{method:'POST'})}catch(e){} localStorage.removeItem('rde_token');localStorage.removeItem('rde_user');authToken='';user=null;home()}
loadCloudData().finally(home);if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
function esc(v){return String(v??'').replace(/[&<>\"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',"'":'&#39;'}[m]))}

async function studentDashboard(){if(!authToken)return login();try{const d=await api('/api/dashboard/student');const r=await api('/api/results');const pct=d.enrolled?Math.round(d.courseSummary.reduce((n,c)=>n+c.percent,0)/d.enrolled):0;box.innerHTML='<h2>👤 My Learning Dashboard <span class="badge">V45</span></h2><div class="stats"><div class="stat"><b>'+d.enrolled+'</b><span>Enrolled Courses</span></div><div class="stat"><b>'+d.completedLessons+'</b><span>Completed Lessons</span></div><div class="stat"><b>'+d.avgScore+'%</b><span>Average Score</span></div><div class="stat"><b>'+d.streak+' 🔥</b><span>Learning Streak</span></div></div><div class="panel"><b>Overall Learning Progress</b><progress value="'+pct+'" max="100" style="width:100%"></progress><div class="small">'+pct+'% average course progress</div></div><h3>📚 Course Progress</h3>'+(d.courseSummary.length?d.courseSummary.map(c=>'<div class="panel"><b>'+esc(c.title)+'</b><div class="small">'+c.completed+'/'+c.total+' lessons completed — '+c.percent+'%</div><progress value="'+c.percent+'" max="100" style="width:100%"></progress>'+(c.nextLesson?'<button onclick="openNextLesson('+JSON.stringify(c.nextLesson.id)+')">▶ Continue: '+esc(c.nextLesson.title)+'</button>':'<div class="badge">🎓 Course Complete</div>')+'</div>').join(''):'<p>No enrolled courses yet.</p>')+'<h3>🔔 Latest Notifications</h3>'+(d.notifications.length?d.notifications.map(n=>'<div class="panel"><b>'+esc(n.title)+'</b><br>'+esc(n.message||'')+'</div>').join(''):'<p>No new notifications.</p>')+'<h3>🏆 Certificates</h3>'+(d.certificates.length?d.certificates.map(c=>'<div class="panel">🎓 <b>'+esc(c.title)+'</b><br><span class="small">Certificate eligibility achieved.</span><br><button onclick="alert(\'Certificate generation module is ready for the next release.\')">View Certificate</button></div>').join(''):'<div class="panel small">Complete all lessons of an enrolled course to become certificate-eligible.</div>')+'<h3>📝 Recent Test Results</h3>'+(r.length?r.slice().reverse().slice(0,5).map(x=>'<div class="panel">Score: <b>'+esc(x.score)+'/'+esc(x.total)+'</b><br><small>'+new Date(x.created_at).toLocaleString('hi-IN')+'</small></div>').join(''):'<p>No test attempts yet.</p>');modal.style.display="flex"}catch(e){alert(e.message)}}
async function generateCertificate(courseId){try{const c=await api('/api/certificates/generate',{method:'POST',body:JSON.stringify({course_id:courseId})});box.innerHTML=`<h2>🎓 Certificate Generated</h2><div class="panel"><b>${esc(c.course_title)}</b><br>Certificate No: ${esc(c.certificate_no)}<br><small>Issued: ${new Date(c.issued_at).toLocaleDateString('en-IN')}</small></div><button onclick="window.open(API_BASE+'/api/certificates/'+encodeURIComponent('${'${c.certificate_no}'}')+'/html','_blank')">📄 View / Print Certificate</button><button onclick="studentDashboard()">Back to Dashboard</button>`;modal.style.display='flex'}catch(e){alert(e.message)}}

async function openNextLesson(id){try{const l=await api('/api/lessons');const x=l.find(v=>v.id===id);if(x)openLessonContent(x)}catch(e){alert(e.message)}}

async function adminLessons(){if(!authToken)return login();const ls=await api('/api/lessons');box.innerHTML='<h2>⚙️ Lesson Manager</h2><p class="small">Admin can add and manage lessons.</p><form onsubmit="createLesson(event)"><select id="lessonCourse">'+courseData.map(c=>'<option value="'+c.id+'">'+esc(c.title)+'</option>').join('')+'</select><input id="lessonTitle" placeholder="Lesson title" required><input id="lessonDesc" placeholder="Short description"><textarea id="lessonContent" placeholder="Lesson content"></textarea><button>Add Lesson</button></form><hr>'+ls.map(l=>'<div class="quizq"><b>'+esc(l.title)+'</b><p class="small">'+esc(l.description||'')+'</p><button onclick="openLessonContentById('+JSON.stringify(l.id)+')">Open</button><button onclick="deleteLesson('+JSON.stringify(l.id)+')">Delete</button></div>').join('');window.lessonCache=ls;modal.style.display='flex'}
async function createLesson(e){e.preventDefault();await api('/api/lessons',{method:'POST',body:JSON.stringify({course_id:document.getElementById('lessonCourse').value,title:document.getElementById('lessonTitle').value,description:document.getElementById('lessonDesc').value,content:document.getElementById('lessonContent').value})});adminLessons()}
async function deleteLesson(id){if(!confirm('Delete this lesson?'))return;await api('/api/lessons/'+id,{method:'DELETE'});adminLessons()}


function openNote(n){box.innerHTML='<h2>📄 '+esc(n.title||'Study Note')+'</h2><p>'+esc(n.description||'')+'</p>'+(n.url?'<iframe src="'+esc(n.url)+'" style="width:100%;height:60vh;border:0"></iframe>':'<div class="quizq">'+esc(n.content||'No content available')+'</div>');modal.style.display='flex'}
function openVideo(v){box.innerHTML='<h2>🎥 '+esc(v.title||'Video Class')+'</h2>'+(v.url&&/youtube|youtu\.be/.test(v.url)?'<iframe src="'+esc(v.url.replace('watch?v=','embed/'))+'" style="width:100%;aspect-ratio:16/9;border:0" allowfullscreen></iframe>':'<video controls style="width:100%;max-height:60vh" src="'+esc(v.url||'')+'"></video>');modal.style.display='flex'}
function openLessonContent(l){box.innerHTML='<h2>📖 '+esc(l.title)+'</h2><div class="quizq">'+esc(l.content||'Lesson content will be added soon.')+'</div>';modal.style.display='flex'}


async function adminUpload(){
 if(!authToken)return login();
 box.innerHTML='<h2>📤 Upload Study Material</h2><p class="small">Upload PDF, video or image files.</p><form onsubmit="submitUpload(event)"><input id="uploadFile" type="file" accept=".pdf,video/*,image/*" required><button>Upload File</button></form><p class="small">After upload, use the returned file URL in Notes or Video Classes.</p>';
 modal.style.display='flex';
}
async function submitUpload(e){
 e.preventDefault();const f=document.getElementById('uploadFile').files[0];if(!f)return;
 const reader=new FileReader();reader.onload=async()=>{const base64=String(reader.result).split(',')[1]||'';const r=await fetch(API+'/api/admin/upload',{method:'POST',headers:{'Content-Type':'application/json',Authorization:'Bearer '+authToken},body:JSON.stringify({filename:f.name,content_base64:base64})});
 const d=await r.json();if(!r.ok)throw new Error(d.error||'Upload failed');
 box.innerHTML='<h2>✅ Upload Successful</h2><p>'+esc(d.filename)+'</p><div class="quizq"><b>File URL:</b><br>'+esc(d.url)+'</div><button onclick="adminUpload()">Upload Another</button>';};reader.readAsDataURL(f);
}

</script></body></html>
